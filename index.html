<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Checker Kupon Undian</title>
<meta name="theme-color" content="#7c3aed">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    margin: 0;
    padding: 0;
  }

  html {
    transition: background 0.4s;
  }
  html.light-bg {
    background: linear-gradient(135deg, #c9b8f0 0%, #b8d0f5 40%, #a8e6d0 100%);
  }
  html.dark-bg {
    background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
  }

  body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
  }

  .app-scale-wrapper {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    position: fixed;
    top: 0;
    left: 0;
  }

  :root {
    --font-ui: 'Segoe UI', 'Arial', sans-serif;
    --font-mono: 'Consolas', 'Courier New', monospace;
  }

  #app {
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    font-family: var(--font-ui);
    transition: background 0.4s;
    position: relative;
    overflow: hidden;
    transform-origin: top left;
  }

  /* Light theme */
  #app.light {
    background: linear-gradient(135deg, #c9b8f0 0%, #b8d0f5 40%, #a8e6d0 100%);
  }
  #app.light .bg-orb1 {
    content: '';
    position: absolute;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.5) 0%, transparent 65%);
    top: -150px;
    left: -100px;
    pointer-events: none;
    z-index: 0;
  }
  #app.light .bg-orb2 {
    position: absolute;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(168,216,255,0.45) 0%, transparent 65%);
    bottom: -100px;
    right: -80px;
    pointer-events: none;
    z-index: 0;
  }
  #app.light .topbar {
    background: rgba(255,255,255,0.3);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(255,255,255,0.5);
    position: relative;
    z-index: 5;
  }
  #app.light .topbar-title { color: #1e0d5c; }
  #app.light .topbar-title span { color: #7c3aed; }
  #app.light .scan-panel {
    background: rgba(255,255,255,0.22);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(255,255,255,0.45);
    position: relative;
    z-index: 4;
  }
  #app.light .scan-input {
    background: rgba(255,255,255,0.45);
    border-color: rgba(255,255,255,0.8);
    color: #1e0d5c;
    backdrop-filter: blur(10px);
  }
  #app.light .scan-input::placeholder { color: rgba(50,30,110,0.38); }
  #app.light .scan-input:focus {
    border-color: rgba(124,58,237,0.55);
    background: rgba(255,255,255,0.7);
    box-shadow: 0 0 0 3px rgba(124,58,237,0.12);
  }
  #app.light .queue-badge { display: none; }
  #app.light .tbl-label { color: rgba(30,13,92,0.65); }
  #app.light .hapus-btn {
    background: rgba(220,40,40,0.07);
    border-color: rgba(220,40,40,0.22);
    color: #b91c1c;
  }
  #app.light .hapus-btn:hover {
    background: rgba(220,40,40,0.14);
    color: #7f1d1d;
  }
  #app.light .upload-btn {
    background: rgba(255,255,255,0.4);
    border-color: rgba(255,255,255,0.75);
    color: rgba(30,13,92,0.7);
    backdrop-filter: blur(8px);
  }
  #app.light .upload-btn:hover {
    background: rgba(255,255,255,0.6);
    color: #1e0d5c;
  }
  #app.light .upload-btn.loaded {
    border-color: rgba(0,150,100,0.4);
    color: #065f46;
    background: rgba(0,180,120,0.1);
  }
  #app.light .table-section { position: relative; z-index: 3; }
  #app.light .table-wrap {
    background: rgba(255,255,255,0.18);
    backdrop-filter: blur(1px);
    border-color: rgba(255,255,255,0.5);
  }
  #app.light .table-header {
    background: rgba(255,255,255,0.25);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,0.5);
  }
  #app.light .table-header th {
    color: rgba(25,13,92,0.8);
    background: transparent;
  }
  #app.light .table-body {
    background: rgba(255,255,255,0.1);
  }
  #app.light tbody tr:hover { background: rgba(255,255,255,0.18); }
  #app.light tbody td {
    color: #1e0d5c;
    font-family: var(--font-mono);
    font-size: 12px;
  }
  #app.light .empty-row td { color: rgba(30,13,92,0.28); }
  #app.light .divider-row td {
    background: rgba(124,58,237,0.07);
    color: #4c1d95;
    border-top: 1px solid rgba(124,58,237,0.18);
    border-bottom: 1px solid rgba(124,58,237,0.18);
  }
  #app.light .result-banner.win {
    background: rgba(0,160,100,0.1);
    border-color: rgba(0,160,100,0.35);
    color: #065f46;
  }
  #app.light .result-banner.lose {
    background: rgba(200,30,30,0.07);
    border-color: rgba(200,30,30,0.25);
    color: #b91c1c;
  }
  #app.light .bottom-bar {
    background: rgba(0,0,0,0.03);
    border-top-color: rgba(0,0,0,0.1);
    color: #1e0d5c;
  }
  #app.light .bottom-clock { color: rgba(50,30,110,0.65); }
  #app.light .mode-btn, #app.light .fullscreen-btn {
    color: rgba(50,30,110,0.7);
    background: rgba(255,255,255,0.4);
    border-color: rgba(255,255,255,0.75);
    backdrop-filter: blur(10px);
  }
  #app.light .mode-btn:hover, #app.light .fullscreen-btn:hover {
    background: rgba(255,255,255,0.65);
    color: #1e0d5c;
  }

  /* Dark theme */
  #app.dark {
    background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
  }
  #app.dark .topbar {
    background: rgba(0,0,0,0.4);
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  #app.dark .topbar-title { color: #fff; }
  #app.dark .topbar-title span { color: #a78bfa; }
  #app.dark .mode-btn, #app.dark .fullscreen-btn {
    color: rgba(255,255,255,0.5);
    background: rgba(255,255,255,0.07);
    border-color: rgba(255,255,255,0.12);
  }
  #app.dark .mode-btn:hover, #app.dark .fullscreen-btn:hover {
    color: #fff;
    background: rgba(255,255,255,0.13);
  }
  #app.dark .scan-panel {
    background: rgba(255,255,255,0.04);
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  #app.dark .scan-input {
    background: rgba(0,0,0,0.4);
    border-color: rgba(255,255,255,0.15);
    color: #fff;
  }
  #app.dark .scan-input::placeholder { color: rgba(255,255,255,0.2); }
  #app.dark .scan-input:focus {
    border-color: rgba(120,80,255,0.6);
    background: rgba(120,80,255,0.07);
    box-shadow: 0 0 0 3px rgba(120,80,255,0.12);
  }
  #app.dark .queue-badge { display: none; }
  #app.dark .tbl-label { color: rgba(255,255,255,0.5); }
  #app.dark .hapus-btn {
    background: rgba(220,40,40,0.2);
    border-color: rgba(220,40,40,0.4);
    color: #f87171;
  }
  #app.dark .hapus-btn:hover {
    background: rgba(220,40,40,0.35);
    color: #fff;
  }
  #app.dark .upload-btn {
    background: rgba(255,255,255,0.07);
    border-color: rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.6);
  }
  #app.dark .upload-btn:hover {
    background: rgba(255,255,255,0.12);
    color: #fff;
  }
  #app.dark .upload-btn.loaded {
    border-color: rgba(0,200,120,0.4);
    color: #00d48a;
    background: rgba(0,200,120,0.08);
  }
  #app.dark .table-wrap {
    background: rgba(0,0,0,0.25);
    border-color: rgba(255,255,255,0.1);
  }
  #app.dark .table-header {
    background: rgba(0,0,0,0.45);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  #app.dark .table-header th {
    color: rgba(255,255,255,0.7);
    background: transparent;
  }
  #app.dark .table-body {
    background: rgba(0,0,0,0.2);
  }
  #app.dark tbody tr { border-bottom: 1px solid rgba(255,255,255,0.05); }
  #app.dark tbody tr:hover { background: rgba(255,255,255,0.04); }
  #app.dark tbody td {
    color: rgba(255,255,255,0.75);
    font-family: var(--font-mono);
    font-size: 12px;
  }
  #app.dark .empty-row td { color: rgba(255,255,255,0.18); }
  #app.dark .divider-row td {
    background: rgba(167,139,250,0.08);
    color: #c4b5fd;
    border-top: 1px solid rgba(167,139,250,0.2);
    border-bottom: 1px solid rgba(167,139,250,0.2);
  }
  #app.dark .result-banner.win {
    background: rgba(0,200,120,0.12);
    border-color: rgba(0,200,120,0.45);
    color: #00d48a;
  }
  #app.dark .result-banner.lose {
    background: rgba(220,40,40,0.1);
    border-color: rgba(220,40,40,0.4);
    color: #ff6b5b;
  }
  #app.dark .bottom-bar {
    background: rgba(255,255,255,0.03);
    border-top-color: rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.7);
  }
  #app.dark .bottom-clock { color: rgba(255,255,255,0.45); }

  /* ===== SCROLLBAR KUSTOM + AUTO HIDE ===== */
  .table-body {
    scrollbar-width: thin; /* Firefox */
    transition: scrollbar-color 0.2s;
  }
  /* Webkit */
  .table-body::-webkit-scrollbar {
    width: 6px;
    height: 6px;
    background: transparent;
  }
  .table-body::-webkit-scrollbar-track {
    background: transparent;
    margin-block: 2px;
  }
  .table-body::-webkit-scrollbar-thumb {
    background: rgba(124,58,237,0.3);
    border-radius: 10px;
    transition: background 0.3s ease;
  }
  #app.light .table-body::-webkit-scrollbar-thumb {
    background: rgba(124,58,237,0.25);
  }
  #app.dark .table-body::-webkit-scrollbar-thumb {
    background: rgba(167,139,250,0.35);
  }
  /* Saat hover pada area scrollbar atau saat discroll (aktif) */
  .table-body:hover::-webkit-scrollbar-thumb,
  .table-body.scrolling::-webkit-scrollbar-thumb {
    background: rgba(124,58,237,0.7);
  }
  #app.light .table-body:hover::-webkit-scrollbar-thumb,
  #app.light .table-body.scrolling::-webkit-scrollbar-thumb {
    background: rgba(124,58,237,0.8);
  }
  #app.dark .table-body:hover::-webkit-scrollbar-thumb,
  #app.dark .table-body.scrolling::-webkit-scrollbar-thumb {
    background: rgba(167,139,250,0.9);
  }
  /* Firefox */
  .table-body {
    scrollbar-color: rgba(124,58,237,0.3) transparent;
  }
  .table-body:hover {
    scrollbar-color: rgba(124,58,237,0.7) transparent;
  }
  #app.dark .table-body {
    scrollbar-color: rgba(167,139,250,0.35) transparent;
  }
  #app.dark .table-body:hover {
    scrollbar-color: rgba(167,139,250,0.9) transparent;
  }

  /* ===== TOPBAR ===== */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px 20px;
    flex-shrink: 0;
  }
  .topbar-title {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    font-family: var(--font-ui);
  }

  /* ===== SCAN PANEL ===== */
  .scan-panel {
    padding: 14px 20px;
    flex-shrink: 0;
  }
  .scan-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .scan-input {
    flex: 1;
    border-radius: 10px;
    padding: 13px 18px;
    font-size: 16px;
    font-family: var(--font-mono);
    font-weight: 500;
    letter-spacing: 3px;
    outline: none;
    transition: all 0.25s;
    text-transform: uppercase;
    border: 1px solid;
  }
  .scan-input::placeholder {
    letter-spacing: 1px;
    font-size: 12px;
    text-transform: none;
    font-family: var(--font-ui);
  }
  .cek-btn {
    padding: 0 28px;
    height: 50px;
    background: linear-gradient(135deg, #7c3aed, #4f46e5);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-family: var(--font-ui);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .cek-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 18px rgba(124,58,237,0.45);
  }
  .cek-btn:active { transform: scale(0.97); }
  .queue-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0 16px;
    height: 50px;
    border-radius: 10px;
    border: 1px solid;
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 1px;
    white-space: nowrap;
    flex-shrink: 0;
    transition: all 0.25s;
  }
  .result-banner {
    margin-top: 10px;
    padding: 12px 18px;
    border-radius: 10px;
    font-family: var(--font-mono);
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 1px;
    text-align: center;
    text-transform: uppercase;
    display: none;
    animation: fadeIn 0.3s ease;
    border: 1px solid;
  }
  .result-banner.win,
  .result-banner.lose { display: block; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ===== TABLE SECTION (header & body terpisah) ===== */
  .table-section {
    flex: 1 1 0;
    min-height: 0;
    padding: 14px 20px 8px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .table-toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    flex-shrink: 0;
  }
  .toolbar-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .toolbar-right {
    margin-left: auto;
    display: flex;
    gap: 8px;
  }
  .tbl-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-family: var(--font-mono);
  }
  .hapus-btn {
    padding: 6px 14px;
    border-radius: 7px;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    border: 1px solid;
  }
  input[type="file"] { display: none; }
  .upload-btn {
    padding: 6px 14px;
    border-radius: 7px;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    border: 1px solid;
  }
  .export-btn {
    padding: 6px 16px;
    border-radius: 7px;
    background: linear-gradient(135deg, #065f46, #047857);
    border: 1px solid rgba(0,200,120,0.3);
    color: #fff;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .export-btn:hover { opacity: 0.85; }

  .table-wrap {
    flex: 1 1 0;
    min-height: 0;
    border-radius: 12px;
    border: 1px solid;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .table-header {
    flex-shrink: 0;
    overflow-x: auto;
    overflow-y: hidden;
    border-bottom: 1px solid rgba(0,0,0,0.1);
  }
  .table-body {
    flex: 1;
    overflow: auto;
    transition: scrollbar-color 0.2s;
  }
  .table-header table, .table-body table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }
  /* Lebar kolom seragam */
  .table-header th:first-child, .table-body td:first-child { width: 55px; }
  .table-header th:nth-child(2), .table-body td:nth-child(2) { width: 115px; }
  .table-header th:nth-child(3), .table-body td:nth-child(3) { width: 105px; }
  .table-header th:last-child, .table-body td:last-child { width: auto; }

  .table-header th {
    padding: 11px 8px;
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    text-align: left;
    white-space: nowrap;
  }
  .table-body td {
    padding: 10px 8px;
    font-family: var(--font-mono);
    font-size: 12px;
    white-space: nowrap;
  }
  .table-body td:last-child {
    white-space: normal;
    word-break: break-word;
  }

  .divider-row td {
    padding: 7px 8px;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-align: center;
  }
  .empty-row td {
    text-align: center;
    padding: 40px;
    font-size: 12px;
    letter-spacing: 1px;
    font-family: var(--font-mono);
  }

  /* Win glow */
  .result-banner.win {
    animation: glowPulse 1.2s ease-in-out infinite, fadeIn 0.4s ease;
    box-shadow: 0 0 15px 2px rgba(0,200,120,0.6), 0 0 30px 5px rgba(0,255,150,0.3);
    border-width: 1.5px;
    backdrop-filter: blur(4px);
    padding: 18px 22px;
    font-size: 1.25rem;
    font-weight: 800;
  }
  @keyframes glowPulse {
    0%   { box-shadow: 0 0 5px 1px rgba(0,220,120,0.5), 0 0 15px 3px rgba(0,200,100,0.3); text-shadow: 0 0 2px rgba(0,255,150,0.5); }
    50%  { box-shadow: 0 0 20px 6px rgba(0,255,150,0.9), 0 0 40px 12px rgba(0,200,100,0.5); text-shadow: 0 0 6px rgba(0,255,150,0.9); }
    100% { box-shadow: 0 0 5px 1px rgba(0,220,120,0.5), 0 0 15px 3px rgba(0,200,100,0.3); text-shadow: 0 0 2px rgba(0,255,150,0.5); }
  }
  #app.light .result-banner.win {
    box-shadow: 0 0 12px 3px rgba(0,180,100,0.7), 0 0 25px 8px rgba(0,220,120,0.4);
    animation: glowPulseLight 1.2s ease-in-out infinite;
  }
  @keyframes glowPulseLight {
    0%   { box-shadow: 0 0 6px 2px rgba(0,160,80,0.5); text-shadow: 0 0 1px #065f46; }
    50%  { box-shadow: 0 0 22px 8px rgba(0,220,120,0.9), 0 0 35px 12px rgba(0,200,100,0.6); text-shadow: 0 0 5px #00d48a; }
    100% { box-shadow: 0 0 6px 2px rgba(0,160,80,0.5); text-shadow: 0 0 1px #065f46; }
  }

  /* ===== BOTTOM BAR ===== */
  .bottom-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 7px 20px;
    border-top: 1px solid rgba(255,255,255,0.2);
    flex-shrink: 0;
    font-family: var(--font-mono);
    font-size: 12px;
  }
  .bottom-clock {
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 1px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .bottom-spacer { flex: 1; }
  .mode-btn, .fullscreen-btn {
    font-family: var(--font-mono);
    font-size: 16px;
    padding: 4px 11px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    border: 1px solid;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    flex-shrink: 0;
  }
  .zoom-slider {
    width: 140px;
    cursor: pointer;
    accent-color: #7c3aed;
    flex-shrink: 0;
  }
  .zoom-value {
    min-width: 40px;
    text-align: right;
    flex-shrink: 0;
  }

  /* ===== OVERLAY ===== */
  #fullscreen-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: linear-gradient(135deg, #c9b8f0 0%, #b8d0f5 40%, #a8e6d0 100%);
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-ui);
    transition: opacity 0.5s ease, visibility 0.5s ease;
  }
  #fullscreen-overlay.hide {
    opacity: 0;
    visibility: hidden;
  }
  .overlay-card {
    background: rgba(255,255,255,0.25);
    backdrop-filter: blur(20px);
    border-radius: 32px;
    padding: 40px 32px;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.4);
    max-width: 90%;
    width: 420px;
    box-shadow: 0 25px 45px rgba(0,0,0,0.2);
    animation: fadeUp 0.5s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .overlay-card h2 { color: #1e0d5c; font-size: 26px; margin-bottom: 8px; letter-spacing: 2px; font-family: var(--font-ui); font-weight: 700; }
  .overlay-card h2 span { color: #7c3aed; }
  .overlay-sub {
    color: #2d1b69;
    margin-bottom: 28px;
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 500;
    opacity: 0.7;
  }
  .overlay-upload-zone {
    border: 2px dashed rgba(124,58,237,0.4);
    border-radius: 16px;
    padding: 28px 20px;
    margin-bottom: 20px;
    cursor: pointer;
    transition: all 0.25s;
    background: rgba(255,255,255,0.2);
  }
  .overlay-upload-zone:hover {
    border-color: rgba(124,58,237,0.8);
    background: rgba(255,255,255,0.35);
  }
  .overlay-upload-zone.has-file {
    border-color: rgba(0,160,100,0.6);
    background: rgba(0,200,120,0.08);
  }
  .overlay-upload-icon { font-size: 32px; margin-bottom: 10px; display: block; }
  .overlay-upload-label {
    font-family: var(--font-mono);
    font-size: 12px;
    color: rgba(30,13,92,0.6);
    letter-spacing: 1px;
    display: block;
  }
  .overlay-kupon-info {
    font-family: var(--font-mono);
    font-size: 24px;
    font-weight: 500;
    color: #065f46;
    display: block;
    letter-spacing: 2px;
    margin-bottom: 4px;
  }
  .overlay-kupon-sub {
    font-family: var(--font-mono);
    font-size: 11px;
    color: rgba(6,95,70,0.7);
    letter-spacing: 1px;
    display: block;
    margin-bottom: 8px;
  }
  .overlay-reupload-hint {
    font-family: var(--font-mono);
    font-size: 10px;
    color: rgba(30,13,92,0.4);
    letter-spacing: 1px;
    display: block;
    margin-top: 8px;
    text-decoration: underline;
    cursor: pointer;
  }
  .overlay-reupload-hint:hover { color: rgba(124,58,237,0.7); }
  #confirmFullscreenBtn {
    background: linear-gradient(135deg, #7c3aed, #4f46e5);
    border: none;
    padding: 14px 28px;
    border-radius: 40px;
    font-size: 16px;
    font-weight: bold;
    color: white;
    font-family: var(--font-ui);
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
    letter-spacing: 1px;
    width: 100%;
  }
  #confirmFullscreenBtn:hover:not(:disabled) { transform: scale(1.02); box-shadow: 0 10px 25px rgba(124,58,237,0.4); }
  #confirmFullscreenBtn:active:not(:disabled) { transform: scale(0.98); }
  #confirmFullscreenBtn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
    filter: grayscale(0.4);
  }
</style>
</head>
<body>

<div id="fullscreen-overlay">
  <div class="overlay-card">
    <h2>🎫 <span>Checker</span> Kupon</h2>
    <p class="overlay-sub">Upload master kupon untuk memulai</p>
    <input type="file" id="overlayFileInput" accept=".xlsx,.xls,.csv">
    <div class="overlay-upload-zone" id="overlayUploadZone">
      <span class="overlay-upload-icon">📂</span>
      <span class="overlay-upload-label">Klik untuk upload file Excel</span>
      <span class="overlay-upload-label" style="margin-top:4px;font-size:10px;opacity:0.6">(.xlsx / .xls / .csv)</span>
    </div>
    <div class="overlay-upload-zone has-file" id="overlayFileInfo" style="display:none;">
      <span class="overlay-upload-icon">✅</span>
      <span class="overlay-kupon-info" id="overlayKuponCount">0 Kupon</span>
      <span class="overlay-kupon-sub" id="overlayFileName">—</span>
      <span class="overlay-reupload-hint" id="overlayReuploadBtn">↺ Ganti file</span>
    </div>
    <button id="confirmFullscreenBtn" disabled>Check Kupon</button>
  </div>
</div>

<div class="app-scale-wrapper">
<div id="app" class="light">
  <div class="bg-orb1"></div>
  <div class="bg-orb2"></div>

  <div class="topbar">
    <div class="topbar-title">Checker <span>Kupon</span> Undian</div>
  </div>

  <div class="scan-panel">
    <div class="scan-row">
      <input type="text" class="scan-input" id="couponInput" placeholder="Nomor kupon..." autocomplete="off" autofocus>
      <div class="queue-badge" id="queueBadge">▸ Antrian</div>
      <button class="cek-btn" onclick="checkCoupon()">Cek Kupon</button>
    </div>
    <div class="result-banner" id="resultBanner"></div>
  </div>

  <div class="table-section">
    <div class="table-toolbar">
      <div class="toolbar-left">
        <span class="tbl-label">Riwayat Pengecekan</span>
        <button class="hapus-btn" onclick="clearHistory()">Hapus Riwayat</button>
      </div>
      <div class="toolbar-right">
        <input type="file" id="fileInput" accept=".xlsx,.xls,.csv">
        <button class="upload-btn" id="uploadBtn" onclick="document.getElementById('fileInput').click()">Upload List Kupon</button>
        <button class="export-btn" onclick="exportExcel()">Export Pemenang</button>
      </div>
    </div>
    <div class="table-wrap">
      <div class="table-header">
        <table>
          <thead>
            <tr><th>No</th><th>Waktu</th><th>Kupon</th><th>Hadiah</th></tr>
          </thead>
        </table>
      </div>
      <div class="table-body" id="tableBody">
        <table>
          <tbody id="historyBody">
            <tr class="empty-row"><td colspan="4">— Belum ada riwayat pengecekan —</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="bottom-bar">
    <span class="bottom-clock" id="clock">--/--/---- --:--:--</span>
    <div class="bottom-spacer"></div>
    <button class="mode-btn" onclick="toggleTheme()">🌓</button>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>
    <span class="mode-btn">🔍</span>
    <input type="range" id="zoomSlider" class="zoom-slider" min="1" max="2" step="0.05" value="1">
    <span id="zoomValue" class="zoom-value">100%</span>
  </div>
</div>
</div>

<script>
  let couponDB = {};
  let history = [];
  let currentQueue = 1;
  let currentQueueCount = 0;

  // Auto-hide scrollbar logic
  const tableBody = document.querySelector('.table-body');
  let scrollTimeout;
  function handleScrollStart() {
    if (!tableBody) return;
    tableBody.classList.add('scrolling');
    clearTimeout(scrollTimeout);
    scrollTimeout = setTimeout(() => {
      tableBody.classList.remove('scrolling');
    }, 1000);
  }
  if (tableBody) {
    tableBody.addEventListener('scroll', handleScrollStart);
    // juga saat mouse enter area scrollbar (tapi cukup dengan hover CSS)
  }

  function saveStorage() {
    try {
      localStorage.setItem('kupon_db', JSON.stringify(couponDB));
      localStorage.setItem('kupon_history', JSON.stringify(history));
      localStorage.setItem('kupon_queue', String(currentQueue));
      localStorage.setItem('kupon_queue_count', String(currentQueueCount));
    } catch(e) {}
  }

  function loadStorage() {
    try {
      const db   = localStorage.getItem('kupon_db');
      const hist = localStorage.getItem('kupon_history');
      const q    = localStorage.getItem('kupon_queue');
      const qc   = localStorage.getItem('kupon_queue_count');
      if (db)   couponDB = JSON.parse(db);
      if (hist) history  = JSON.parse(hist);
      if (q)    currentQueue = parseInt(q);
      if (qc)   currentQueueCount = parseInt(qc);
    } catch(e) {}
  }

  function updateQueueBadge() {
    document.getElementById('queueBadge').textContent = '▸ Antrian #' + currentQueue;
  }

  function updateClock() {
    const now = new Date();
    const pad = n => String(n).padStart(2,'0');
    document.getElementById('clock').textContent =
      pad(now.getDate())+'/'+pad(now.getMonth()+1)+'/'+now.getFullYear()+' '+
      pad(now.getHours())+':'+pad(now.getMinutes())+':'+pad(now.getSeconds());
  }
  setInterval(updateClock, 1000);
  updateClock();

  function syncMainUploadBtn() {
    const count = Object.keys(couponDB).length;
    const btn = document.getElementById('uploadBtn');
    if (count > 0) {
      btn.textContent = '✓ ' + count.toLocaleString('id-ID') + ' Kupon';
      btn.classList.add('loaded');
    } else {
      btn.textContent = 'Upload List Kupon';
      btn.classList.remove('loaded');
    }
  }

  loadStorage();
  syncMainUploadBtn();
  updateQueueBadge();
  if (history.length > 0) renderHistory();
  newQueue();

  document.getElementById('fileInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      try {
        const wb   = XLSX.read(ev.target.result, { type: 'binary' });
        const ws   = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { header: 1 });
        couponDB = {};
        let count = 0;
        for (let i = 1; i < rows.length; i++) {
          const row = rows[i];
          if (!row || !row[0]) continue;
          const code  = String(row[0]).trim().toUpperCase();
          const prize = row[1] ? String(row[1]).trim() : 'Hadiah';
          couponDB[code] = prize;
          count++;
        }
        localStorage.setItem('kupon_filename', file.name);
        syncMainUploadBtn();
        saveStorage();
      } catch(err) {
        alert('Gagal membaca file. Format: kolom A = Nomor Kupon, kolom B = Hadiah');
      }
    };
    reader.readAsBinaryString(file);
    this.value = '';
  });

  document.getElementById('couponInput').addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    const val = document.getElementById('couponInput').value.trim();
    if (val === '') { newQueue(); } else { checkCoupon(); }
  });

  function newQueue() {
    if (currentQueueCount === 0) return;
    currentQueue++;
    currentQueueCount = 0;
    updateQueueBadge();
    history.unshift({ type: 'divider', queue: currentQueue });
    renderHistory();
    saveStorage();
    document.getElementById('resultBanner').className = 'result-banner';
  }

  function checkCoupon() {
    const raw = document.getElementById('couponInput').value.trim();
    if (!raw) return;

    const banner = document.getElementById('resultBanner');
    banner.className = 'result-banner';

    if (raw.length !== 6) {
      banner.className = 'result-banner lose';
      banner.textContent = '⚠️ Cek nomor kupon! Harus 6 karakter.';
      return;
    }

    const code = raw.toUpperCase();

    if (Object.keys(couponDB).length === 0) {
      banner.className = 'result-banner lose';
      banner.textContent = '⚡ Upload master kupon terlebih dahulu!';
      return;
    }

    const pad = n => String(n).padStart(2,'0');
    const now = new Date();
    const waktu = pad(now.getDate())+'/'+pad(now.getMonth()+1)+'/'+now.getFullYear()+' '+pad(now.getHours())+':'+pad(now.getMinutes());

    let status, prize;
    if (couponDB[code]) {
      status = 'menang'; prize = couponDB[code];
      banner.className = 'result-banner win';
      banner.textContent = '🏆 Selamat! : ' + prize;
    } else {
      status = 'belum'; prize = '-';
      banner.className = 'result-banner lose';
      banner.textContent = '✗ Kupon belum memenangkan Undian';
    }

    currentQueueCount++;
    history.unshift({ type:'entry', no: currentQueueCount, waktu, code, prize, status, queue: currentQueue });
    renumberHistory();
    renderHistory();
    saveStorage();
    document.getElementById('couponInput').value = '';
    document.getElementById('couponInput').focus();
  }

  function renumberHistory() {
    const counters = {};
    for (let i = history.length - 1; i >= 0; i--) {
      const h = history[i];
      if (h.type === 'divider') continue;
      if (!counters[h.queue]) counters[h.queue] = 0;
      counters[h.queue]++;
      h.no = counters[h.queue];
    }
  }

  function renderHistory() {
    const tbody = document.getElementById('historyBody');
    if (history.length === 0) {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="4">— Belum ada riwayat pengecekan —</td></tr>';
      return;
    }
    tbody.innerHTML = history.map(h => {
      if (h.type === 'divider') {
        return `<tr class="divider-row"><td colspan="4">— Antrian #${h.queue} —</td></tr>`;
      }
      return `<tr>
          <td class="no-col">${h.no}</td>
          <td class="waktu-col">${h.waktu}</td>
          <td class="kupon-col">${h.code}</td>
          <td class="hadiah-col">${h.prize}</td>
        </tr>`;
    }).join('');
  }

  function clearHistory() {
    if (!history.length) return;
    history = []; currentQueue = 1; currentQueueCount = 0;
    updateQueueBadge();
    document.getElementById('resultBanner').className = 'result-banner';
    renderHistory();
    saveStorage();
  }

  function exportExcel() {
    const winners = history.filter(h => h.type === 'entry' && h.status === 'menang');
    if (!winners.length) { alert('Tidak ada pemenang untuk diekspor.'); return; }
    const rows = [['No','Waktu','Kupon','Hadiah']];
    winners.forEach(h => rows.push([h.no, h.waktu, h.code, h.prize]));
    const ws = XLSX.utils.aoa_to_sheet(rows);
    ws['!cols'] = [{wch:12},{wch:6},{wch:18},{wch:18},{wch:32}];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Pemenang');
    XLSX.writeFile(wb, 'pemenang_kupon.xlsx');
  }

  let isDark = false;
  function toggleTheme() {
    isDark = !isDark;
    document.getElementById('app').className = isDark ? 'dark' : 'light';
    const htmlElem = document.documentElement;
    if (isDark) {
      htmlElem.classList.remove('light-bg');
      htmlElem.classList.add('dark-bg');
    } else {
      htmlElem.classList.remove('dark-bg');
      htmlElem.classList.add('light-bg');
    }
  }

  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(err => {
        console.log(`Error: ${err.message}`);
      });
    } else {
      document.exitFullscreen();
    }
  }

  // Zoom
  const appEl = document.getElementById('app');
  const zoomSlider = document.getElementById('zoomSlider');
  const zoomValueSpan = document.getElementById('zoomValue');

  function applyZoom(val) {
    const inverse = 1 / val;
    appEl.style.transform = `scale(${val})`;
    appEl.style.transformOrigin = 'top left';
    appEl.style.width = (inverse * 100) + 'vw';
    appEl.style.height = (inverse * 100) + 'vh';
  }

  const savedZoom = localStorage.getItem('appZoom');
  if (savedZoom) {
    const zoom = parseFloat(savedZoom);
    if (!isNaN(zoom) && zoom >= 1 && zoom <= 2) {
      zoomSlider.value = zoom;
      zoomValueSpan.textContent = Math.round(zoom * 100) + '%';
      applyZoom(zoom);
    }
  }
  zoomSlider.addEventListener('input', (e) => {
    const val = parseFloat(e.target.value);
    zoomValueSpan.textContent = Math.round(val * 100) + '%';
    applyZoom(val);
    localStorage.setItem('appZoom', val);
  });

  document.documentElement.classList.add('light-bg');

  // Overlay
  (function initOverlay() {
    const overlay      = document.getElementById('fullscreen-overlay');
    const confirmBtn   = document.getElementById('confirmFullscreenBtn');
    const overlayInput = document.getElementById('overlayFileInput');
    const uploadZone   = document.getElementById('overlayUploadZone');
    const fileInfo     = document.getElementById('overlayFileInfo');
    const kuponCount   = document.getElementById('overlayKuponCount');
    const fileNameEl   = document.getElementById('overlayFileName');
    const reuploadBtn  = document.getElementById('overlayReuploadBtn');

    function refreshOverlayState() {
      const count = Object.keys(couponDB).length;
      if (count > 0) {
        uploadZone.style.display = 'none';
        fileInfo.style.display   = 'block';
        kuponCount.textContent   = count.toLocaleString('id-ID') + ' Kupon';
        const savedName = localStorage.getItem('kupon_filename') || 'Data tersimpan';
        fileNameEl.textContent   = savedName;
        confirmBtn.disabled      = false;
      } else {
        uploadZone.style.display = 'block';
        fileInfo.style.display   = 'none';
        confirmBtn.disabled      = true;
      }
    }

    refreshOverlayState();

    uploadZone.addEventListener('click', () => overlayInput.click());
    reuploadBtn.addEventListener('click', () => overlayInput.click());

    overlayInput.addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(ev) {
        try {
          const wb   = XLSX.read(ev.target.result, { type: 'binary' });
          const ws   = wb.Sheets[wb.SheetNames[0]];
          const rows = XLSX.utils.sheet_to_json(ws, { header: 1 });
          couponDB = {};
          let count = 0;
          for (let i = 1; i < rows.length; i++) {
            const row = rows[i];
            if (!row || !row[0]) continue;
            const code  = String(row[0]).trim().toUpperCase();
            const prize = row[1] ? String(row[1]).trim() : 'Hadiah';
            couponDB[code] = prize;
            count++;
          }
          localStorage.setItem('kupon_filename', file.name);
          saveStorage();
          syncMainUploadBtn();
          refreshOverlayState();
        } catch(err) {
          alert('Gagal membaca file. Format: kolom A = Nomor Kupon, kolom B = Hadiah');
        }
      };
      reader.readAsBinaryString(file);
      this.value = '';
    });

    confirmBtn.addEventListener('click', () => {
      document.documentElement.requestFullscreen().catch(err => {
        console.warn('Gagal masuk fullscreen:', err);
      });
      overlay.classList.add('hide');
      setTimeout(() => { overlay.style.display = 'none'; }, 500);
    });
  })();
</script>
</body>
</html>
