<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Checker Kupon Undian</title>
<meta name="theme-color" content="#7c3aed">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;width:100%;overflow:hidden;}

  #app{
    height:100vh;width:100%;
    display:flex;flex-direction:column;
    font-family:'Syne',sans-serif;
    transition:background 0.4s;
    position:relative;
  }



  /* ── LIGHT (glassmorphic) ── */
  #app.light{background:linear-gradient(135deg,#c9b8f0 0%,#b8d0f5 40%,#a8e6d0 100%);}
  #app.light .bg-orb1{
    content:'';position:absolute;width:500px;height:500px;border-radius:50%;
    background:radial-gradient(circle,rgba(255,255,255,0.5) 0%,transparent 65%);
    top:-150px;left:-100px;pointer-events:none;z-index:0;
  }
  #app.light .bg-orb2{
    position:absolute;width:400px;height:400px;border-radius:50%;
    background:radial-gradient(circle,rgba(168,216,255,0.45) 0%,transparent 65%);
    bottom:-100px;right:-80px;pointer-events:none;z-index:0;
  }
  #app.light .topbar{
    background:rgba(255,255,255,0.3);
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border-bottom:1px solid rgba(255,255,255,0.5);
    position:relative;z-index:5;
  }
  #app.light .topbar-clock{color:rgba(50,30,110,0.65);}
  #app.light .topbar-title{color:#1e0d5c;}
  #app.light .topbar-title span{color:#7c3aed;}
  #app.light .mode-btn, #app.light .fullscreen-btn, #app.light .install-btn{
    color:rgba(50,30,110,0.7);
    background:rgba(255,255,255,0.4);
    border-color:rgba(255,255,255,0.75);
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  }
  #app.light .mode-btn:hover, #app.light .fullscreen-btn:hover, #app.light .install-btn:hover{background:rgba(255,255,255,0.65);color:#1e0d5c;}
  #app.light .scan-panel{
    background:rgba(255,255,255,0.22);
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border-bottom:1px solid rgba(255,255,255,0.45);
    position:relative;z-index:4;
  }
  #app.light .scan-input{
    background:rgba(255,255,255,0.45);
    border-color:rgba(255,255,255,0.8);
    color:#1e0d5c;
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  }
  #app.light .scan-input::placeholder{color:rgba(50,30,110,0.38);}
  #app.light .scan-input:focus{border-color:rgba(124,58,237,0.55);background:rgba(255,255,255,0.7);box-shadow:0 0 0 3px rgba(124,58,237,0.12);}
  #app.light .queue-badge{display: none}
  #app.light .tbl-label{color:rgba(30,13,92,0.65);}
  #app.light .hapus-btn{background:rgba(220,40,40,0.07);border-color:rgba(220,40,40,0.22);color:#b91c1c;}
  #app.light .hapus-btn:hover{background:rgba(220,40,40,0.14);color:#7f1d1d;}
  #app.light .upload-btn{
    background:rgba(255,255,255,0.4);border-color:rgba(255,255,255,0.75);
    color:rgba(30,13,92,0.7);
    backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  }
  #app.light .upload-btn:hover{background:rgba(255,255,255,0.6);color:#1e0d5c;}
  #app.light .upload-btn.loaded{border-color:rgba(0,150,100,0.4);color:#065f46;background:rgba(0,180,120,0.1);}
  #app.light .table-section{position:relative;z-index:3;}
  #app.light .table-wrap{
    background:rgba(255,255,255,0.18);
    backdrop-filter:blur(1px);-webkit-backdrop-filter:blur(24px);
    border-color:rgba(255,255,255,0.5);
  }
  #app.light thead th{color:rgba(25,13,92,0.6);}
  #app.light thead tr {backdrop-filter: blur(30px);background:rgba(255,255,255,0.7);border-bottom:1px solid rgba(255,255,255,0.1);}
  #app.light tbody tr:hover{background:rgba(255,255,255,0.18);}
  #app.light td{color:#1e0d5c;}
  #app.light td.no-col{color:rgba(30,13,92,0.32);width :5px;}
  #app.light td.waktu-col{color:rgba(30,13,92,0.48);width :60px;}
  #app.light td.kupon-col{color:#1e0d5c;font-weight:600;width :0px}
  #app.light td.hadiah-col{color:rgba(30,13,92,0.72);}
  #app.light .empty-row td{color:rgba(30,13,92,0.28);}
  #app.light .divider-row td{background:rgba(124,58,237,0.07);color:#4c1d95;border-top:1px solid rgba(124,58,237,0.18);border-bottom:1px solid rgba(124,58,237,0.18);}
  #app.light .result-banner.win{background:rgba(0,160,100,0.1);border-color:rgba(0,160,100,0.35);color:#065f46;}
  #app.light .result-banner.lose{background:rgba(200,30,30,0.07);border-color:rgba(200,30,30,0.25);color:#b91c1c;}
  #app.light .badge-menang{color:#78350f;background:rgba(234,179,8,0.14);border-color:rgba(234,179,8,0.38);}
  #app.light .badge-belum{color:#991b1b;background:rgba(220,40,40,0.07);border-color:rgba(220,40,40,0.25);}
  #app.light .tbl-scroll::-webkit-scrollbar-thumb{background:rgba(124,58,237,0.2);}
  #app.light .tbl-scroll::-webkit-scrollbar-thumb:hover{background:rgba(124,58,237,0.4);}

   /* ── DARK ── */
  #app.dark{background:linear-gradient(135deg,#0f0c29 0%,#302b63 50%,#24243e 100%);}
  #app.dark .topbar{background:rgba(0,0,0,0.4);border-bottom:1px solid rgba(255,255,255,0.08);}
  #app.dark .topbar-clock{color:rgba(255,255,255,0.45);}
  #app.dark .topbar-title{color:#fff;}
  #app.dark .topbar-title span{color:#a78bfa;}
  #app.dark .mode-btn, #app.dark .fullscreen-btn, #app.dark .install-btn{color:rgba(255,255,255,0.5);background:rgba(255,255,255,0.07);border-color:rgba(255,255,255,0.12);}
  #app.dark .mode-btn:hover, #app.dark .fullscreen-btn:hover, #app.dark .install-btn:hover{color:#fff;background:rgba(255,255,255,0.13);}
  #app.dark .scan-panel{background:rgba(255,255,255,0.04);border-bottom:1px solid rgba(255,255,255,0.08);}
  #app.dark .scan-input{background:rgba(0,0,0,0.4);border-color:rgba(255,255,255,0.15);color:#fff;}
  #app.dark .scan-input::placeholder{color:rgba(255,255,255,0.2);}
  #app.dark .scan-input:focus{border-color:rgba(120,80,255,0.6);background:rgba(120,80,255,0.07);box-shadow:0 0 0 3px rgba(120,80,255,0.12);}
  #app.dark .queue-badge{display: none}
  #app.dark .tbl-label{color:rgba(255,255,255,0.5);}
  #app.dark .hapus-btn{background:rgba(220,40,40,0.2);border-color:rgba(220,40,40,0.4);color:#f87171;}
  #app.dark .hapus-btn:hover{background:rgba(220,40,40,0.35);color:#fff;}
  #app.dark .upload-btn{background:rgba(255,255,255,0.07);border-color:rgba(255,255,255,0.15);color:rgba(255,255,255,0.6);}
  #app.dark .upload-btn:hover{background:rgba(255,255,255,0.12);color:#fff;}
  #app.dark .upload-btn.loaded{border-color:rgba(0,200,120,0.4);color:#00d48a;background:rgba(0,200,120,0.08);}
  #app.dark .table-wrap{background:rgba(0,0,0,0.25);border-color:rgba(255,255,255,0.1);}
  #app.dark thead tr{backdrop-filter: blur(10px);background:rgba(255,255,255,0.06);border-bottom:1px solid rgba(255,255,255,0.1);}
  #app.dark thead th{color:rgba(255,255,255,0.4);}
  #app.dark tbody tr{border-bottom:1px solid rgba(255,255,255,0.05);}
  #app.dark tbody tr:hover{background:rgba(255,255,255,0.04);}
  #app.dark td{color:rgba(255,255,255,0.75);}
  #app.dark td.no-col{color:rgba(255,255,255,0.25);width :5px;}
  #app.dark td.waktu-col{color:rgba(255,255,255,0.35);width :60px;}
  #app.dark td.kupon-col{color:#fff;width :0px}
  #app.dark td.hadiah-col{color:rgba(255,255,255,0.65);}
  #app.dark .empty-row td{color:rgba(255,255,255,0.18);}
  #app.dark .divider-row td{background:rgba(167,139,250,0.08);color:#c4b5fd;border-top:1px solid rgba(167,139,250,0.2);border-bottom:1px solid rgba(167,139,250,0.2);}
  #app.dark .result-banner.win{background:rgba(0,200,120,0.12);border-color:rgba(0,200,120,0.45);color:#00d48a;}
  #app.dark .result-banner.lose{background:rgba(220,40,40,0.1);border-color:rgba(220,40,40,0.4);color:#ff6b5b;}
  #app.dark .badge-menang{color:#fbbf24;background:rgba(234,179,8,0.2);border-color:rgba(234,179,8,0.5);}
  #app.dark .badge-belum{color:#f87171;background:rgba(220,40,40,0.15);border-color:rgba(220,40,40,0.4);}
  #app.dark .tbl-scroll::-webkit-scrollbar-thumb{background:rgba(167,139,250,0.3);}
  #app.dark .tbl-scroll::-webkit-scrollbar-thumb:hover{background:rgba(167,139,250,0.55);}

  /* ── SHARED ── */
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;flex-shrink:0;}
  .topbar-clock{font-family:'DM Mono',monospace;font-size:12px;letter-spacing:1px;}
  .topbar-title{font-size:14px;font-weight:800;letter-spacing:3px;text-transform:uppercase;}
  .topbar-buttons{display:flex;gap:8px;}
  .mode-btn, .fullscreen-btn, .install-btn{
    font-family:'DM Mono',monospace;
    font-size:16px;
    padding:5px 12px;
    border-radius:6px;
    cursor:pointer;
    transition:all 0.2s;
    border:1px solid;
    display:flex;
    align-items:center;
    justify-content:center;
    line-height:1;
  }

  .scan-panel{padding:14px 20px;flex-shrink:0;}
  .scan-row{display:flex;gap:10px;align-items:center;}
  .scan-input{flex:1;border-radius:10px;padding:13px 18px;font-size:16px;font-family:'DM Mono',monospace;font-weight:500;letter-spacing:3px;outline:none;transition:all 0.25s;text-transform:uppercase;border:1px solid;}
  .scan-input::placeholder{letter-spacing:1px;font-size:12px;text-transform:none;}
  .cek-btn{padding:0 28px;height:50px;background:linear-gradient(135deg,#7c3aed,#4f46e5);border:none;border-radius:10px;color:#fff;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.2s;letter-spacing:1px;text-transform:uppercase;white-space:nowrap;}
  .cek-btn:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(124,58,237,0.45);}
  .cek-btn:active{transform:scale(0.97);}
  .queue-badge{display:flex;align-items:center;gap:6px;padding:0 16px;height:50px;border-radius:10px;border:1px solid;font-family:'DM Mono',monospace;font-size:12px;font-weight:500;letter-spacing:1px;white-space:nowrap;flex-shrink:0;transition:all 0.25s;}

  .result-banner{margin-top:10px;padding:12px 18px;border-radius:10px;font-family:'DM Mono',monospace;font-size:14px;font-weight:500;letter-spacing:1px;text-align:center;text-transform:uppercase;display:none;animation:fadeIn 0.3s ease;border:1px solid;}
  .result-banner.win,.result-banner.lose{display:block;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

  .table-section{flex:1;padding:14px 20px 16px;display:flex;flex-direction:column;min-height:0;}
  .table-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-shrink:0;}
  .toolbar-left{display:flex;align-items:center;gap:10px;}
  .toolbar-right{margin-left:auto;display:flex;gap:8px;}
  .tbl-label{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;font-family:'DM Mono',monospace;}
  .hapus-btn{padding:6px 14px;border-radius:7px;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all 0.2s;border:1px solid;}
  input[type=file]{display:none;}
  .upload-btn{padding:6px 14px;border-radius:7px;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all 0.2s;white-space:nowrap;border:1px solid;}
  .export-btn{padding:6px 16px;border-radius:7px;background:linear-gradient(135deg,#065f46,#047857);border:1px solid rgba(0,200,120,0.3);color:#fff;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
  .export-btn:hover{opacity:0.85;}

  .table-wrap{flex:1;border-radius:4px;overflow:hidden;border:1px solid;display:flex;flex-direction:column;min-height:0;}
  .tbl-scroll{flex:1;overflow-y:auto;}
  .tbl-scroll::-webkit-scrollbar{width:6px;}
  .tbl-scroll::-webkit-scrollbar-track{background:transparent;}
  .tbl-scroll::-webkit-scrollbar-thumb{border-radius:10px;transition:background 0.2s;}
  table{width:100%;border-collapse:collapse;}
  thead tr{position:sticky;top:0;z-index:3;}
  thead th{padding:11px 14px;font-family:'DM Mono',monospace;font-size:11px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;text-align:left;white-space:nowrap;}
  thead th:last-child{text-align:center;}
  tbody tr{transition:background 0.15s;animation:fadeIn 0.25s ease;}
  tbody td{padding:11px 14px;font-family:'DM Mono',monospace;font-size:12px;}
  td.no-col{width:40px;}
  td.waktu-col{white-space:nowrap;font-size:11px;}
  td.kupon-col{letter-spacing:2px;}
  td.hadiah-col{color:rgba(30,13,92,0.72);}
  .badge-menang{display:inline-block;padding:4px 14px;border-radius:6px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;border:1px solid;}
  .badge-belum{display:inline-block;padding:4px 14px;border-radius:6px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;border:1px solid;}
  .divider-row td{padding:7px 14px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;text-align:center;}
  .empty-row td{text-align:center;padding:40px;font-size:12px;letter-spacing:1px;}

  .result-banner.win {
    animation: glowPulse 1.2s ease-in-out infinite, fadeIn 0.4s ease;
    box-shadow: 0 0 15px 2px rgba(0, 200, 120, 0.6), 0 0 30px 5px rgba(0, 255, 150, 0.3);
    border-width: 1.5px;
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    backdrop-filter: blur(4px);
    padding: 18px 22px;
    font-size: 1.25rem;
    font-weight: 800;
  }

  @keyframes glowPulse {
    0% { box-shadow: 0 0 5px 1px rgba(0, 220, 120, 0.5), 0 0 15px 3px rgba(0, 200, 100, 0.3); text-shadow: 0 0 2px rgba(0,255,150,0.5); }
    50% { box-shadow: 0 0 20px 6px rgba(0, 255, 150, 0.9), 0 0 40px 12px rgba(0, 200, 100, 0.5); text-shadow: 0 0 6px rgba(0,255,150,0.9); }
    100% { box-shadow: 0 0 5px 1px rgba(0, 220, 120, 0.5), 0 0 15px 3px rgba(0, 200, 100, 0.3); text-shadow: 0 0 2px rgba(0,255,150,0.5); }
  }

  #app.light .result-banner.win {
    box-shadow: 0 0 12px 3px rgba(0, 180, 100, 0.7), 0 0 25px 8px rgba(0, 220, 120, 0.4);
    animation: glowPulseLight 1.2s ease-in-out infinite;
  }

  @keyframes glowPulseLight {
    0% { box-shadow: 0 0 6px 2px rgba(0, 160, 80, 0.5); text-shadow: 0 0 1px #065f46; }
    50% { box-shadow: 0 0 22px 8px rgba(0, 220, 120, 0.9), 0 0 35px 12px rgba(0, 200, 100, 0.6); text-shadow: 0 0 5px #00d48a; }
    100% { box-shadow: 0 0 6px 2px rgba(0, 160, 80, 0.5); text-shadow: 0 0 1px #065f46; }
  }
</style>
</head>
<body>
<div id="app" class="dark">
  <div class="bg-orb1"></div>
  <div class="bg-orb2"></div>

  <div class="topbar">
    <div class="topbar-clock" id="clock">--/--/---- --:--:--</div>
    <div class="topbar-title">Checker <span>Kupon</span> Undian</div>
    <div class="topbar-buttons">
      <button class="install-btn" id="installBtn" style="display:none;">📲 Install</button>
      <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>
      <button class="mode-btn" onclick="toggleTheme()">🌓</button>
    </div>
  </div>

  <div class="scan-panel">
    <div class="scan-row">
      <input type="text" class="scan-input" id="couponInput" placeholder="Nomor kupon..." autocomplete="off" autofocus>
      <div class="queue-badge" id="queueBadge">▸ Antrian</div>
      <button class="cek-btn" onclick="checkCoupon()">Cek Kupon</button>
    </div>
    <div class="result-banner" id="resultBanner"></div>
  </div>

  <div class="table-section">
    <div class="table-toolbar">
      <div class="toolbar-left">
        <span class="tbl-label">Riwayat Pengecekan</span>
        <button class="hapus-btn" onclick="clearHistory()">Hapus Riwayat</button>
      </div>
      <div class="toolbar-right">
        <input type="file" id="fileInput" accept=".xlsx,.xls,.csv">
        <button class="upload-btn" id="uploadBtn" onclick="document.getElementById('fileInput').click()">Upload List Kupon</button>
        <button class="export-btn" onclick="exportExcel()">Export Pemenang</button>
      </div>
    </div>
    <div class="table-wrap">
      <div class="tbl-scroll">
        <table>
          <thead>
            <tr>
              <th>No</th>
              <th>Waktu</th>
              <th>Kupon</th>
              <th>Hadiah</th>
            </tr>
          </thead>
          <tbody id="historyBody">
            <tr class="empty-row"><td colspan="4">— Belum ada riwayat pengecekan —</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
  // --- FUNGSI UTAMA APLIKASI (Checker) ---
  let couponDB = {};
  let history = [];
  let currentQueue = 1;
  let currentQueueCount = 0;

  function saveStorage() {
    try {
      localStorage.setItem('kupon_db', JSON.stringify(couponDB));
      localStorage.setItem('kupon_history', JSON.stringify(history));
      localStorage.setItem('kupon_queue', String(currentQueue));
      localStorage.setItem('kupon_queue_count', String(currentQueueCount));
    } catch(e) {}
  }

  function loadStorage() {
    try {
      const db   = localStorage.getItem('kupon_db');
      const hist = localStorage.getItem('kupon_history');
      const q    = localStorage.getItem('kupon_queue');
      const qc   = localStorage.getItem('kupon_queue_count');
      if (db)   couponDB = JSON.parse(db);
      if (hist) history  = JSON.parse(hist);
      if (q)    currentQueue = parseInt(q);
      if (qc)   currentQueueCount = parseInt(qc);
    } catch(e) {}
  }

  function updateQueueBadge() {
    document.getElementById('queueBadge').textContent = '▸ Antrian #' + currentQueue;
  }

  function updateClock() {
    const now = new Date();
    const pad = n => String(n).padStart(2,'0');
    document.getElementById('clock').textContent =
      pad(now.getDate())+'/'+pad(now.getMonth()+1)+'/'+now.getFullYear()+' '+
      pad(now.getHours())+':'+pad(now.getMinutes())+':'+pad(now.getSeconds());
  }
  setInterval(updateClock, 1000);
  updateClock();

  loadStorage();
  if (Object.keys(couponDB).length > 0) {
    const btn = document.getElementById('uploadBtn');
    btn.textContent = '✓ ' + Object.keys(couponDB).length + ' Kupon';
    btn.classList.add('loaded');
  }
  updateQueueBadge();
  if (history.length > 0) renderHistory();
  newQueue();

  document.getElementById('fileInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      try {
        const wb   = XLSX.read(ev.target.result, { type: 'binary' });
        const ws   = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { header: 1 });
        couponDB = {};
        let count = 0;
        for (let i = 1; i < rows.length; i++) {
          const row = rows[i];
          if (!row || !row[0]) continue;
          const code  = String(row[0]).trim().toUpperCase();
          const prize = row[1] ? String(row[1]).trim() : 'Hadiah';
          couponDB[code] = prize;
          count++;
        }
        const btn = document.getElementById('uploadBtn');
        btn.textContent = '✓ ' + count + ' Kupon';
        btn.classList.add('loaded');
        saveStorage();
      } catch(err) {
        alert('Gagal membaca file. Format: kolom A = Nomor Kupon, kolom B = Hadiah');
      }
    };
    reader.readAsBinaryString(file);
    this.value = '';
  });

  document.getElementById('couponInput').addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    const val = document.getElementById('couponInput').value.trim();
    if (val === '') {
      newQueue();
    } else {
      checkCoupon();
    }
  });

  function newQueue() {
    if (currentQueueCount === 0) return; 
    currentQueue++;
    currentQueueCount = 0;
    updateQueueBadge();
    history.unshift({ type: 'divider', queue: currentQueue });
    renderHistory();
    saveStorage();
    document.getElementById('resultBanner').className = 'result-banner';
  }

  function checkCoupon() {
    const raw = document.getElementById('couponInput').value.trim();
    if (!raw) return;
    
    const banner = document.getElementById('resultBanner');
    banner.className = 'result-banner';

    if (raw.length !== 6) {
      banner.className = 'result-banner lose';
      banner.textContent = '⚠️ Cek nomor kupon! Harus 6 karakter.';
      return;
    }

    const code = raw.toUpperCase();

    if (Object.keys(couponDB).length === 0) {
      banner.className = 'result-banner lose';
      banner.textContent = '⚡ Upload master kupon terlebih dahulu!';
      return;
    }

    const pad = n => String(n).padStart(2,'0');
    const now = new Date();
    const waktu = pad(now.getDate())+'/'+pad(now.getMonth()+1)+'/'+now.getFullYear()+' '+pad(now.getHours())+':'+pad(now.getMinutes());

    let status, prize;
    if (couponDB[code]) {
      status = 'menang'; prize = couponDB[code];
      banner.className = 'result-banner win';
      banner.textContent = '🏆 Selamat! : ' + prize;
    } else {
      status = 'belum'; prize = '-';
      banner.className = 'result-banner lose';
      banner.textContent = '✗ Kupon belum memenangkan Undian';
    }

    currentQueueCount++;
    history.unshift({ type:'entry', no: currentQueueCount, waktu, code, prize, status, queue: currentQueue });
    renumberHistory();
    renderHistory();
    saveStorage();
    document.getElementById('couponInput').value = '';
    document.getElementById('couponInput').focus();
  }

  function renumberHistory() {
    const counters = {};
    for (let i = history.length - 1; i >= 0; i--) {
      const h = history[i];
      if (h.type === 'divider') continue;
      if (!counters[h.queue]) counters[h.queue] = 0;
      counters[h.queue]++;
      h.no = counters[h.queue];
    }
  }

  function renderHistory() {
    const tbody = document.getElementById('historyBody');
    if (history.length === 0) {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="4">— Belum ada riwayat pengecekan —</td></tr>';
      return;
    }
    tbody.innerHTML = history.map(h => {
      if (h.type === 'divider') {
        return `<tr class="divider-row"><td colspan="4">— Antrian #${h.queue} —</td></tr>`;
      }
      return `<tr>
          <td class="no-col">${h.no}</td>
          <td class="waktu-col">${h.waktu}</td>
          <td class="kupon-col">${h.code}</td>
          <td class="hadiah-col">${h.prize}</td>
         </tr>`;
    }).join('');
  }

  function clearHistory() {
    if (!history.length) return;
    history = []; currentQueue = 1; currentQueueCount = 0;
    updateQueueBadge();
    document.getElementById('resultBanner').className = 'result-banner';
    renderHistory();
    saveStorage();
  }

  function exportExcel() {
    const winners = history.filter(h => h.type === 'entry' && h.status === 'menang');
    if (!winners.length) { alert('Tidak ada pemenang untuk diekspor.'); return; }
    const rows = [['No','Waktu','Kupon','Hadiah']];
    winners.forEach(h => rows.push([h.no, h.waktu, h.code, h.prize]));
    const ws = XLSX.utils.aoa_to_sheet(rows);
    ws['!cols'] = [{wch:12},{wch:6},{wch:18},{wch:18},{wch:32}];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Pemenang');
    XLSX.writeFile(wb, 'pemenang_kupon.xlsx');
  }

  let isDark = true;
  function toggleTheme() {
    isDark = !isDark;
    document.getElementById('app').className = isDark ? 'dark' : 'light';
  }

  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(err => {
        console.log(`Error attempting fullscreen: ${err.message}`);
      });
    } else {
      document.exitFullscreen();
    }
  }

  // ========== PWA: Manifest + Service Worker + Tombol Install Manual ==========
  (function initPWA() {
    if (location.protocol === 'file:') {
      console.warn('PWA tidak dapat diinstall karena dijalankan via file://. Gunakan localhost atau HTTPS.');
      return;
    }

    // --- Buat manifest blob dan pasang ---
    const manifestObj = {
      name: "Checker Kupon Undian",
      short_name: "CheckerKupon",
      description: "Cek nomor kupon undian dan riwayat",
      start_url: ".",
      display: "standalone",
      theme_color: "#7c3aed",
      background_color: "#0f0c29",
      icons: [
        {
          src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' fill='%237c3aed'/%3E%3Ctext x='256' y='350' font-size='280' text-anchor='middle' fill='white' font-family='monospace'%3E🎫%3C/text%3E%3C/svg%3E",
          sizes: "512x512",
          type: "image/svg+xml"
        },
        {
          src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' fill='%237c3aed'/%3E%3Ctext x='96' y='130' font-size='100' text-anchor='middle' fill='white' font-family='monospace'%3E🎫%3C/text%3E%3C/svg%3E",
          sizes: "192x192",
          type: "image/svg+xml"
        }
      ]
    };
    const manifestBlob = new Blob([JSON.stringify(manifestObj)], {type: 'application/json'});
    const manifestURL = URL.createObjectURL(manifestBlob);
    const manifestLink = document.createElement('link');
    manifestLink.rel = 'manifest';
    manifestLink.href = manifestURL;
    document.head.appendChild(manifestLink);

    // --- Service Worker sederhana (cache offline) ---
    const swScript = `
      const CACHE_NAME = 'kupon-checker-v1';
      const urlsToCache = [
        './',
        '${location.pathname}',
        'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js',
        'https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap'
      ];

      self.addEventListener('install', event => {
        event.waitUntil(
          caches.open(CACHE_NAME).then(cache => cache.addAll(urlsToCache))
        );
        self.skipWaiting();
      });

      self.addEventListener('fetch', event => {
        event.respondWith(
          caches.match(event.request).then(response => {
            if (response) return response;
            return fetch(event.request).then(fetchRes => {
              if (!fetchRes || fetchRes.status !== 200 || fetchRes.type !== 'basic') return fetchRes;
              const responseToCache = fetchRes.clone();
              caches.open(CACHE_NAME).then(cache => cache.put(event.request, responseToCache));
              return fetchRes;
            });
          })
        );
      });

      self.addEventListener('activate', event => {
        event.waitUntil(
          caches.keys().then(keys => Promise.all(keys.map(key => {
            if (key !== CACHE_NAME) return caches.delete(key);
          })))
        );
        self.clients.claim();
      });
    `;
    const swBlob = new Blob([swScript], {type: 'application/javascript'});
    const swURL = URL.createObjectURL(swBlob);
    
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register(swURL).then(reg => {
        console.log('Service Worker terdaftar', reg);
      }).catch(err => {
        console.warn('Gagal daftar service worker:', err);
      });
    }

    // --- Tangkap event beforeinstallprompt untuk menampilkan tombol install manual ---
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      const installBtn = document.getElementById('installBtn');
      if (installBtn) installBtn.style.display = 'flex';
    });

    document.getElementById('installBtn')?.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      console.log(`User response to install: ${outcome}`);
      deferredPrompt = null;
      document.getElementById('installBtn').style.display = 'none';
    });
  })();
</script>
